{% extends "layout.html" %}

{% block title %}Course Content - Step 2/2 - e-Learny{% endblock %}

{% block extra_css %}
<style>
    .admin-container {
        padding: 40px 0 120px;
        width: 92%; max-width: 1000px;
        margin: 0 auto;
        font-family: 'Poppins', sans-serif;
    }
    
    .builder-summary {
        background: white; border-radius: 12px; border: 1.5px solid #f1f5f9;
        display: flex; align-items: center; gap: 20px; padding: 15px 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.02); margin-bottom: 25px;
        transition: 0.3s;
    }
    .builder-summary:hover { transform: translateY(-3px); border-color: #007bff; }
    .thumb-pre { width: 80px; height: 45px; border-radius: 8px; overflow: hidden; border: 1.5px solid #f1f5f9; }
    .thumb-pre img { width: 100%; height: 100%; object-fit: cover; }
    .header-text h2 { font-size: 1.1rem; font-weight: 800; color: #1e293b; margin:0; }
    .header-text p { font-size: 0.75rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

    .step-dots { display: flex; gap: 8px; margin-bottom: 25px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0; }
    .dot.active { background: #007bff; width: 25px; border-radius: 8px; }

    /* Chapter Module */
    .chapter-module { 
        background: white; border-radius: 16px; border: 1.5px solid #f1f5f9; 
        padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.02);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .chapter-module:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.06); }
    
    .chapter-header { 
        display: flex; justify-content: space-between; align-items: center; 
        margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1.5px solid #f8fafc;
    }
    .chapter-index { background: #eff6ff; color: #007bff; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; }
    .ch-title-inp { 
        font-size: 1.1rem; font-weight: 800; border: none; background: transparent; 
        color: #1e293b; width: 80%; font-family: 'Poppins', sans-serif;
    }
    .ch-title-inp:focus { outline: none; border-bottom: 2px solid #007bff; }

    /* Lecture Units (Compact) */
    .lecture-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
    .lecture-item { 
        display: grid; grid-template-columns: 30px 1fr 1fr 35px; gap: 12px; 
        background: #fcfdfe; padding: 10px 15px; border-radius: 12px; border: 1px solid #f1f5f9; align-items: center;
        transition: 0.2s;
    }
    .lecture-item:hover { border-color: #007bff; background: white; box-shadow: 0 4px 10px rgba(0,123,255,0.05); }
    .lec-index { font-weight: 800; font-size: 0.75rem; color: #cbd5e1; }
    
    .compact-input {
        width: 100%; padding: 8px 14px; border-radius: 8px; border: 1.5px solid #f1f5f9;
        background: white; font-size: 0.85rem; color: #1e293b; font-family: 'Poppins', sans-serif;
        transition: 0.2s;
    }
    .compact-input:focus { border-color: #007bff; outline: none; }

    .btn-add-unit { 
        background: transparent; color: #007bff; border: 1.5px dashed #dbeafe;
        padding: 8px 16px; border-radius: 10px; font-weight: 800; font-size: 0.75rem; cursor: pointer; transition: 0.2s;
        text-transform: uppercase; font-family: 'Poppins', sans-serif; width: 100%;
    }
    .btn-add-unit:hover { background: #f0f7ff; border-color: #007bff; }

    .btn-del-mini {
        width: 30px; height: 30px; border-radius: 8px; background: #fff5f5; 
        color: #ef4444; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: 0.2s; font-size: 0.75rem;
    }
    .btn-del-mini:hover { background: #ef4444; color: white; transform: rotate(90deg); }

    /* Action Deck */
    .action-deck { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
    
    .btn-new-chapter {
        background: #1e293b; color: white; padding: 14px; border-radius: 12px;
        font-weight: 800; font-size: 0.85rem; border: none; cursor: pointer; transition: 0.3s;
        display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Poppins', sans-serif;
    }
    .btn-new-chapter:hover { background: #000; transform: translateY(-2px); }

    .btn-finish-publish {
        background: #007bff; color: white; padding: 14px; border-radius: 12px;
        font-weight: 800; font-size: 0.85rem; border: none; cursor: pointer; transition: 0.3s;
        display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Poppins', sans-serif;
        box-shadow: 0 8px 20px rgba(0,123,255,0.15);
    }
    .btn-finish-publish:hover { background: #0056b3; transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0,123,255,0.2); }
</style>
{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="builder-summary">
        <div class="thumb-pre">
            <img src="{{ draft.thumbnail or 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800' }}">
        </div>
        <div class="header-text">
            <h2>{{ draft.title }}</h2>
            <p>{{ draft.category }} &bull; {{ draft.level }}</p>
        </div>
    </div>

    <div class="step-dots">
        <div class="dot"></div>
        <div class="dot active"></div>
    </div>

    <form action="{{ url_for('course_content') }}" method="POST" id="publishForm">
        <input type="hidden" name="sections_data" id="curriculumPayload">
        
        <div id="blueprintSpace">
            <!-- Dynamic Modules Injected Here -->
        </div>

        <div class="action-deck">
            <button type="button" class="btn-new-chapter" onclick="spawnChapter()">
                <i class="fas fa-folder-plus"></i> Add New Chapter
            </button>

            <button type="button" class="btn-finish-publish" onclick="executePublish()">
                <i class="fas fa-paper-plane"></i> Publish Course
            </button>
        </div>
    </form>
</div>

<script>
    let chIndex = 0;

    function spawnChapter() {
        const id = chIndex++;
        const tpl = `
            <div class="chapter-module" id="ch-mod-${id}">
                <div class="chapter-header">
                    <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
                        <div class="chapter-index">${id+1}</div>
                        <input type="text" class="ch-title-inp" placeholder="Chapter Heading (e.g. Database Basics)*" required>
                    </div>
                    <button type="button" class="btn-del-mini" onclick="nukeChapter(${id})" title="Remove Chapter">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <div class="lecture-grid" id="lec-stack-${id}"></div>
                <button type="button" class="btn-add-unit" onclick="spawnLecture(${id})">
                    <i class="fas fa-plus"></i> Add Lecture Unit
                </button>
                <div style="margin-top: 15px;">
                    <textarea class="ch-notes-val compact-input" style="height: 60px; resize:none" placeholder="Chapter Study Notes (Optional links, text, or code)..."></textarea>
                </div>
            </div>
        `;
        document.getElementById('blueprintSpace').insertAdjacentHTML('beforeend', tpl);
        spawnLecture(id);
    }

    function spawnLecture(chId) {
        const container = document.getElementById(`lec-stack-${chId}`);
        const lecId = container.children.length + 1;
        const tpl = `
            <div class="lecture-item">
                <div class="lec-index">${lecId}.</div>
                <input type="text" class="lec-t-inp compact-input" placeholder="Title*" required>
                <input type="url" class="lec-u-inp compact-input" placeholder="Video URL*" required>
                <button type="button" class="btn-del-mini" onclick="this.parentElement.remove()" title="Remove Lecture">
                    <i class="fas fa-minus"></i>
                </button>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', tpl);
    }

    function nukeChapter(id) {
        const mods = document.querySelectorAll('.chapter-module');
        if(mods.length > 1) {
            window.customConfirm('Verification Required', 'Are you sure you want to delete this chapter blueprint?', () => {
                document.getElementById(`ch-mod-${id}`).remove();
            });
        }
        else {
            if(window.customAlert) window.customAlert('Structure Error', 'Your curriculum blueprint requires at least one functional chapter.', 'error');
            else alert("Structure Error: Your curriculum blueprint requires at least one functional chapter.");
        }
    }

    function executePublish() {
        const form = document.getElementById('publishForm');
        const data = [];
        const modules = document.querySelectorAll('.chapter-module');

        let valid = true;
        modules.forEach(mod => {
            const title = mod.querySelector('.ch-title-inp').value.trim();
            const notes = mod.querySelector('.ch-notes-val').value.trim();
            const lectures = [];
            mod.querySelectorAll('.lecture-item').forEach(item => {
                const t = item.querySelector('.lec-t-inp').value.trim();
                const u = item.querySelector('.lec-u-inp').value.trim();
                if(t && u) lectures.push({title: t, url: u});
            });

            if(!title || lectures.length === 0) valid = false;
            else data.push({ title, notes, lectures });
        });

        if(!valid) {
            if(window.customAlert) window.customAlert('Curriculum Error', 'Please ensure all chapters have a heading and at least one video unit.', 'error');
            else alert("Blueprint Error: Every chapter must have a heading and at least one video unit.");
            return;
        }

        document.getElementById('curriculumPayload').value = JSON.stringify(data);
        window.customConfirm('Finalize Publication', 'Ready to broadcast this course to the e-Learny catalog?', () => {
            form.submit();
        });
    }

    document.addEventListener('DOMContentLoaded', () => spawnChapter());
</script>
{% endblock %}
